<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpigeon</title>
    <style>
        /* FONT SELECTION: HELVETICA / LIBERTY SANS STYLE */
        body { background:#0b0b0b; color:#eee; font-family: "Helvetica Neue", Helvetica, sans-serif; margin:0; }
        header { background:#1b1b1b; padding:15px 25px; border-bottom:3px solid #d40000; display:flex; align-items:center; justify-content:space-between; }
        .logo-area { display:flex; align-items:center; text-decoration:none; color:#fff; font-weight:bold; font-size:26px; }
        .logo-area span { color:#d40000; }
        .logo-img { height:45px; margin-right:12px; }
        
        /* TABS */
        .nav-tabs { background:#181818; display:flex; border-bottom:1px solid #333; }
        .t-btn { padding:15px 30px; cursor:pointer; font-weight:bold; color:#888; border-bottom:3px solid transparent; }
        .t-btn.active { color:#fff; border-bottom:3px solid #d40000; background:#222; }

        main { padding:25px; max-width:1300px; margin:auto; min-height:60vh; }
        .view { display:none; }
        .view.active { display:block; }

        /* THE PLAYER */
        .player-wrapper { background:#000; width:100%; aspect-ratio:16/9; border:1px solid #333; margin-bottom:15px; display:flex; align-items:center; justify-content:center; }
        .player-wrapper iframe { width:100%; height:100%; border:0; }

        /* GRID UI */
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; }
        .card { background:#151515; border:1px solid #222; border-radius:4px; cursor:pointer; transition:0.2s; }
        .card:hover { border-color:#444; background:#1c1c1c; }
        .thumb { width:100%; height:170px; background:#252525; display:flex; align-items:center; justify-content:center; color:#444; font-weight:bold; }
        .meta { padding:12px; font-size:15px; font-weight:600; }

        footer { background:#111; padding:60px; text-align:center; border-top:1px solid #333; margin-top:50px; }
        .coffee-link { background:#FFDD00; color:#000; padding:14px 28px; border-radius:5px; text-decoration:none; font-weight:bold; display:inline-block; margin-bottom:20px; }
        .legal { font-size:11px; color:#444; margin-top:30px; letter-spacing:1px; }
    </style>
</head>
<body>

<header>
    <a href="#" onclick="showSection('home')" class="logo-area">
        <img src="xpigeonlogo.png" class="logo-img">
        <div><span>X</span>Pigeon</div>
    </a>
</header>

<div class="nav-tabs">
    <div class="t-btn active" id="tab-home" onclick="showSection('home')">Videos</div>
    <div class="t-btn" id="tab-live" onclick="showSection('live')">Cam Pigeons</div>
</div>

<main>
    <div id="view-home" class="view active">
        <h2>Videos</h2>
        <div class="grid" id="video-list">
            </div>
    </div>

    <div id="view-player" class="view">
        <div class="player-wrapper" id="video-portal"></div>
        <h2 id="current-title">Pigeons</h2>
        <button onclick="showSection('home')" style="background:#333; color:#fff; border:0; padding:10px 20px; cursor:pointer;">INSERT HERE</button>
    </div>

    <div id="view-live" class="view">
        <h2>Live</h2>
        <div class="player-wrapper" id="live-portal">
            </div>
    </div>
</main>

<footer>
    <a href="INSERT_COFFEE_URL_HERE" class="coffee-link">Buy Me Seeds</a>
    <div class="legal">This is a parody site which complies with the uk online safety act this means the website has no user to user chat or amy nsfw content everything here is completely sfw </div>
</footer>

<script>
    /* --- DATA BOX: ONLY CHANGE STUFF HERE --- */
    const VIDEO_DATA = [
        { title: "2 Birds 1 Cup", dm_id: "x8x7v6u" }, 
        { title: "Young Step Pigeons Get Seedy", dm_id: "x8x7v6u" },
        { title: "British Birds Eat Fat Balls!!!", dm_id: "x8x7v6u" }
    ];

    const LIVE_DM_URL = "https://www.dailymotion.com/embed/video/x8x7v6u"; // CHANGE THIS FOR LIVE
    /* ---------------------------------------- */

    // Load Videos into Grid
    const container = document.getElementById('video-list');
    VIDEO_DATA.forEach((vid, index) => {
        container.innerHTML += `
            <div class="card" onclick="openPlayer('${vid.title}', '${vid.dm_id}')">
                <div class="thumb">Birds</div>
                <div class="meta">${vid.title}</div>
            </div>
        `;
    });

    function showSection(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.t-btn').forEach(t => t.classList.remove('active'));
        document.getElementById('view-' + id).classList.add('active');
        if(id === 'home') document.getElementById('tab-home').classList.add('active');
        if(id === 'live') {
            document.getElementById('tab-live').classList.add('active');
            document.getElementById('live-portal').innerHTML = `<iframe src="${LIVE_DM_URL}?autoplay=1" allowfullscreen></iframe>`;
        }
    }

    function openPlayer(title, id) {
        showSection('player');
        document.getElementById('current-title').innerText = title;
        document.getElementById('video-portal').innerHTML = `<iframe src="https://www.dailymotion.com/embed/video/${id}?autoplay=1" allowfullscreen></iframe>`;
    }
</script>

</body>
</html>
