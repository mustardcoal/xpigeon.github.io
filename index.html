<head>
<meta charset="UTF-8">
<title>XPigeon</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style> 
:root{--r:#d40000;--b:#0070bb;--g:#f2f2f2;--e:#e0e0e0}
body{font:13px Arial,sans-serif;margin:0;background:var(--g);display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:#1a1a1a;padding:10px 20px;color:#fff;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--r);flex-shrink:0}
.l{font-size:24px;font-weight:800;cursor:pointer;display:flex;align-items:center}
.l span{color:var(--r)}
.m{text-align:right;font-size:10px;color:#888;text-transform:uppercase}
.a{display:block;background:var(--r);color:#fff;padding:5px 15px;text-decoration:none;font-weight:700;margin-top:2px;border-radius:2px;border-bottom:2px solid #900}
.w{display:flex;flex:1;overflow:hidden}
nav{width:200px;background:#fff;border-right:1px solid var(--e);padding-top:10px;flex-shrink:0}
.b{display:block;padding:12px 20px;text-decoration:none;color:#444;font-weight:700;cursor:pointer;border-bottom:1px solid #f9f9f9}
.b:hover{color:var(--b)}.v{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.r{display:flex;padding:15px;gap:15px;justify-content:center;flex:1}
main{flex:1;max-width:1000px}.box{background:#fff;border:1px solid var(--e);padding:15px;min-height:90vh}
.s{width:240px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.f{background:#ddd;border:1px solid #999;display:block;width:240px;height:600px}
.f img{width:100%;height:100%;object-fit:cover;display:block}
.g{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.c{cursor:pointer}.t{width:100%;aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;color:#444;font-size:10px;font-weight:700}
.bt{display:block;margin-top:7px;font-weight:700;color:var(--b);font-size:13px}
iframe{width:100%;height:100%;border:0}.h{display:none}
h2{font-size:18px;margin:0 0 10px;border-bottom:1px solid #eee;text-transform:uppercase}
</style>
</head>
